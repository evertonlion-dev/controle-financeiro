<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Controle Financeiro 💰</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Controle Financeiro 💰</h1>

  <input type="text" id="desc" placeholder="Descrição">
  <input type="number" id="value" placeholder="Valor">

  <div class="buttons">
    <button class="income" onclick="addIncome()">Entrada</button>
    <button class="expense" onclick="addExpense()">Saída</button>
  </div>

  <div class="balance">
    Saldo: R$ <span id="balance">0</span>
  </div>

  <ul id="list"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
